name: CI - Unit & E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CI: true
  BASE_URL: http://localhost:3000

jobs:
  # ──────────────────────────────────────────
  # Job 1: Unit Tests (no browser needed)
  # ──────────────────────────────────────────
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🧪 Run unit tests
        run: npm run test:unit -- --project=chromium

      - name: 📤 Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: allure-results/
          retention-days: 14

  # ──────────────────────────────────────────
  # Job 2: E2E Tests (needs browsers)
  # ──────────────────────────────────────────
  e2e-tests:
    name: 🌐 E2E Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🎭 Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: 🌐 Run E2E tests
        run: npm run test:e2e -- --project=chromium
        env:
          BASE_URL: ${{ vars.BASE_URL || 'http://localhost:3000' }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_SERVICE_NAME: ${{ secrets.DB_SERVICE_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

      - name: 📤 Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            allure-results/
            test-results/
            playwright-report/
          retention-days: 14

      - name: 📤 Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  # ──────────────────────────────────────────
  # Job 3: Allure Report (aggregated)
  # ──────────────────────────────────────────
  allure-report:
    name: 📊 Allure Report
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests]
    if: always()

    steps:
      - name: 📥 Download unit test results
        uses: actions/download-artifact@v4
        with:
          name: unit-test-results
          path: allure-results/unit

      - name: 📥 Download E2E test results
        uses: actions/download-artifact@v4
        with:
          name: e2e-test-results
          path: allure-results/e2e

      - name: 📊 Generate Allure Report
        uses: simple-elf/allure-report-action@v1.9
        with:
          allure_results: allure-results
          allure_report: allure-report

      - name: 📤 Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30
