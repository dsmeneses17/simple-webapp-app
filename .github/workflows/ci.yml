name: CI - Unit & E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  CI: true

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit -- --project=chromium

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: allure-results/
          retention-days: 14

  e2e-tests:
    name: E2E Tests
    runs-on: windows-latest
    needs: unit-tests
    # NOTE: The Oracle image (gvenzl/oracle-free) is Linux-based.
    # Windows-hosted runners require Docker Desktop configured for Linux containers.
    # Consider using a self-hosted runner if this doesn't work on GitHub-hosted Windows runners.

    env:
      BASE_URL: http://localhost:3000
      DB_HOST: localhost
      DB_PORT: 1521
      DB_SERVICE_NAME: FREEPDB1
      DB_USER: testuser
      DB_PASSWORD: testpass123

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start Oracle DB container
        shell: pwsh
        run: |
          docker run -d `
            --name oracle-db `
            -e ORACLE_PASSWORD=oracle123 `
            -e APP_USER=testuser `
            -e APP_USER_PASSWORD=testpass123 `
            -p 1521:1521 `
            gvenzl/oracle-free:23-slim

      - name: Wait for Oracle DB to be ready
        shell: pwsh
        run: |
          Write-Host "Waiting for Oracle DB..."
          for ($i = 1; $i -le 30; $i++) {
            node -e "const oracledb = require('oracledb'); oracledb.getConnection({ user: 'testuser', password: 'testpass123', connectionString: 'localhost:1521/FREEPDB1' }).then(c => { c.close(); process.exit(0); }).catch(() => process.exit(1));" 2>$null
            if ($LASTEXITCODE -eq 0) {
              Write-Host "Oracle DB is ready!"
              break
            }
            Write-Host "  Attempt $i/30 - waiting 5s..."
            Start-Sleep -Seconds 5
          }

      - name: Run E2E tests
        run: npm run test:e2e -- --project=chromium

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            allure-results/
            test-results/
          retention-days: 14
          if-no-files-found: ignore

  allure-report:
    name: Allure Report
    runs-on: windows-latest
    needs: [unit-tests, e2e-tests]
    if: always()

    steps:
      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Download unit test results
        uses: actions/download-artifact@v4
        with:
          name: unit-test-results
          path: allure-results/unit
        continue-on-error: true

      - name: Download E2E test results
        uses: actions/download-artifact@v4
        with:
          name: e2e-test-results
          path: allure-results/e2e
        continue-on-error: true

      - name: Install Allure CLI
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/allure-framework/allure2/releases/download/2.32.0/allure-2.32.0.zip" -OutFile "allure.zip"
          Expand-Archive -Path "allure.zip" -DestinationPath "."
          "$PWD\allure-2.32.0\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Generate Allure Report
        run: allure generate allure-results --clean -o allure-report

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30
          if-no-files-found: ignore
