name: CI - Unit & E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  CI: true

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit -- --project=chromium

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: allure-results/
          retention-days: 14

  e2e-tests:
    name: E2E Tests
    runs-on: windows-latest
    needs: unit-tests

    env:
      BASE_URL: http://localhost:3000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run E2E tests (excluding DB tests)
        run: npm run test:e2e -- --grep-invert "Database Validation" --project=chromium

      - name: Debug - Check E2E test results
        if: always()
        shell: pwsh
        run: |
          Write-Host "Checking for allure-results directory..."
          if (Test-Path "allure-results") {
            Write-Host "✓ allure-results directory exists"
            Get-ChildItem -Path "allure-results" -Recurse | ForEach-Object { Write-Host $_.FullName }
          } else {
            Write-Host "✗ allure-results directory NOT found"
          }
          Write-Host ""
          Write-Host "Checking for test-results directory..."
          if (Test-Path "test-results") {
            Write-Host "✓ test-results directory exists"
            Get-ChildItem -Path "test-results" -Recurse | ForEach-Object { Write-Host $_.FullName }
          } else {
            Write-Host "✗ test-results directory NOT found"
          }

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            allure-results/
            test-results/
          retention-days: 14
          if-no-files-found: ignore

  allure-report:
    name: Allure Report
    runs-on: windows-latest
    needs: [unit-tests, e2e-tests]
    if: always()

    steps:
      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Download unit test results
        uses: actions/download-artifact@v4
        with:
          name: unit-test-results
          path: allure-results-unit
        continue-on-error: true

      - name: Download E2E test results
        uses: actions/download-artifact@v4
        with:
          name: e2e-test-results
          path: allure-results-e2e
        continue-on-error: true

      - name: Merge Allure results
        shell: pwsh
        run: |
          mkdir -p allure-results
          Copy-Item -Path "allure-results-unit/*" -Destination "allure-results/" -Force
          Copy-Item -Path "allure-results-e2e/*" -Destination "allure-results/" -Force

      - name: Debug - Check merged results
        shell: pwsh
        run: |
          Write-Host "=== Unit Results ==="
          if (Test-Path "allure-results-unit") {
            Get-ChildItem -Path "allure-results-unit" -Recurse | Measure-Object | Select-Object Count
          } else {
            Write-Host "No unit results found"
          }
          Write-Host ""
          Write-Host "=== E2E Results ==="
          if (Test-Path "allure-results-e2e") {
            Get-ChildItem -Path "allure-results-e2e" -Recurse | Measure-Object | Select-Object Count
          } else {
            Write-Host "No E2E results found"
          }
          Write-Host ""
          Write-Host "=== Merged Results ==="
          if (Test-Path "allure-results") {
            Get-ChildItem -Path "allure-results" -Recurse | Measure-Object | Select-Object Count
          } else {
            Write-Host "No merged results found"
          }

      - name: Install Allure CLI
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/allure-framework/allure2/releases/download/2.32.0/allure-2.32.0.zip" -OutFile "allure.zip"
          Expand-Archive -Path "allure.zip" -DestinationPath "."
          "$PWD\allure-2.32.0\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Generate Allure Report
        run: allure generate allure-results --clean -o allure-report

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30
          if-no-files-found: ignore
