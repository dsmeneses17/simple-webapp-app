name: CI - Unit & E2E Tests
#comment: This workflow runs unit and E2E tests on a self-hosted runner named self-hosted. It generates Allure reports and deploys them to GitHub Pages.
# Updated to force workflow refresh d1
on:
  push:
    branches: [main, develop, feature/self-hosted-runner]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  CI: true

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit -- --project=chromium

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: allure-results/
          retention-days: 14

  e2e-tests:
    name: E2E Tests
    runs-on: self-hosted
    needs: unit-tests

    env:
      BASE_URL: http://localhost:3000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run E2E tests (excluding DB tests)
        run: npm run test:e2e -- --grep-invert "Database Validation" --project=chromium

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: allure-results/
          retention-days: 14
          if-no-files-found: ignore

  test-results:
    name: Store Test Results
    runs-on: self-hosted
    needs: [unit-tests, e2e-tests]
    if: always()

    steps:
      - name: Download unit test results
        uses: actions/download-artifact@v4
        with:
          name: unit-test-results
          path: allure-results-unit
        continue-on-error: true

      - name: Download E2E test results
        uses: actions/download-artifact@v4
        with:
          name: e2e-test-results
          path: allure-results-e2e
        continue-on-error: true

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install Allure CLI
        run: npm install -g allure-commandline
        continue-on-error: true

      - name: Generate Allure Report
        run: allure generate allure-results-unit allure-results-e2e --clean -o allure-report
        continue-on-error: true
