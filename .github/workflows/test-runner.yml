name: CI - Unit & E2E Tests
#comment: This workflow runs unit and E2E tests on a self-hosted runner named self-hosted. It generates Allure reports and deploys them to GitHub Pages.
# Updated to force workflow refresh d2
on:
  push:
    branches: [main, develop, feature/self-hosted-runner]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  CI: true

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests (excluding database connection tests)
        run: npx playwright test tests/unit/env-config.spec.ts tests/unit/excel-helper.spec.ts tests/unit/oracle-db-helper.spec.ts tests/unit/page-objects.spec.ts --project=chromium --quiet
        env:
          BASE_URL: ${{ vars.BASE_URL }}
          ENV: ${{ vars.ENV }}
          CI: true
          DB_HOST: ${{ vars.DB_HOST }}
          DB_PORT: ${{ vars.DB_PORT }}
          DB_SERVICE_NAME: ${{ secrets.DB_SERVICE_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          EXCEL_DATA_PATH: ${{ vars.EXCEL_DATA_PATH }}

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: allure-results/
          retention-days: 14

  db-connection-tests:
    name: Database Connection Tests
    runs-on: self-hosted
    needs: unit-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run database connection tests
        run: npx playwright test tests/unit/oracle-db-connection.spec.ts --project=chromium --quiet
        env:
          BASE_URL: ${{ vars.BASE_URL }}
          ENV: ${{ vars.ENV }}
          CI: true
          DB_HOST: ${{ vars.DB_HOST }}
          DB_PORT: ${{ vars.DB_PORT }}
          DB_SERVICE_NAME: ${{ secrets.DB_SERVICE_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          EXCEL_DATA_PATH: ${{ vars.EXCEL_DATA_PATH }}

      - name: Upload database test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: db-connection-test-results
          path: allure-results/
          retention-days: 14

  e2e-tests:
    name: E2E Tests
    runs-on: self-hosted
    needs: db-connection-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run E2E tests (INCLUDING Database Validation)
        run: npm run test:e2e -- --project=chromium --quiet
        env:
          BASE_URL: ${{ vars.BASE_URL }}
          ENV: ${{ vars.ENV }}
          CI: true
          DB_HOST: ${{ vars.DB_HOST }}
          DB_PORT: ${{ vars.DB_PORT }}
          DB_SERVICE_NAME: ${{ secrets.DB_SERVICE_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          EXCEL_DATA_PATH: ${{ vars.EXCEL_DATA_PATH }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: allure-results/
          retention-days: 14
          if-no-files-found: ignore

  test-results:
    name: Store Test Results
    runs-on: self-hosted
    needs: [unit-tests, db-connection-tests, e2e-tests]
    if: always()

    steps:
      - name: Download unit test results
        uses: actions/download-artifact@v4
        with:
          name: unit-test-results
          path: allure-results-unit
        continue-on-error: true

      - name: Download database connection test results
        uses: actions/download-artifact@v4
        with:
          name: db-connection-test-results
          path: allure-results-db
        continue-on-error: true

      - name: Download E2E test results
        uses: actions/download-artifact@v4
        with:
          name: e2e-test-results
          path: allure-results-e2e
        continue-on-error: true

      - name: Merge all test results into single directory
        run: |
          if (Test-Path allure-results-unit) {
            New-Item -ItemType Directory -Force -Path allure-results | Out-Null
            Copy-Item -Path allure-results-unit/* -Destination allure-results -Recurse -Force
          }
          if (Test-Path allure-results-db) {
            New-Item -ItemType Directory -Force -Path allure-results | Out-Null
            Copy-Item -Path allure-results-db/* -Destination allure-results -Recurse -Force
          }
          if (Test-Path allure-results-e2e) {
            New-Item -ItemType Directory -Force -Path allure-results | Out-Null
            Copy-Item -Path allure-results-e2e/* -Destination allure-results -Recurse -Force
          }
          Write-Host "=== Final allure-results directory ==="
          Get-ChildItem -Path allure-results -Recurse | Measure-Object | Select-Object -ExpandProperty Count
        shell: powershell

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install Allure CLI
        run: npm install -g allure-commandline
        continue-on-error: true

      - name: Generate Allure Report
        run: allure generate allure-results --clean --reportDir allure-report
        continue-on-error: true

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30
        continue-on-error: true
