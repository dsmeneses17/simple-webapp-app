name: CI - Unit & E2E Tests
#comment: This workflow runs unit and E2E tests on a self-hosted runner named self-hosted. It generates Allure reports and deploys them to GitHub Pages.
# Updated to force workflow refresh d1
on:
  push:
    branches: [main, develop, feature/self-hosted-runner]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  CI: true

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests (excluding database connection tests)
        run: npx playwright test tests/unit/env-config.spec.ts tests/unit/excel-helper.spec.ts tests/unit/oracle-db-helper.spec.ts tests/unit/page-objects.spec.ts --project=chromium --quiet
        env:
          BASE_URL: ${{ vars.BASE_URL }}
          ENV: ${{ vars.ENV }}
          CI: true
          DB_HOST: ${{ vars.DB_HOST }}
          DB_PORT: ${{ vars.DB_PORT }}
          DB_SERVICE_NAME: ${{ secrets.DB_SERVICE_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          EXCEL_DATA_PATH: ${{ vars.EXCEL_DATA_PATH }}
          ALLURE_RESULTS_DIR: ./allure-results-unit

      - name: Move unit test results to named directory
        if: always()
        run: mkdir -p allure-results-unit && mv allure-results/* allure-results-unit/ || true

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: allure-results-unit/
          retention-days: 14

  db-connection-tests:
    name: Database Connection Tests
    runs-on: self-hosted
    needs: unit-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run database connection tests
        run: npx playwright test tests/unit/oracle-db-connection.spec.ts --project=chromium
        env:
          BASE_URL: ${{ vars.BASE_URL }}
          ENV: ${{ vars.ENV }}
          CI: true
          DB_HOST: ${{ vars.DB_HOST }}
          DB_PORT: ${{ vars.DB_PORT }}
          DB_SERVICE_NAME: ${{ secrets.DB_SERVICE_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          EXCEL_DATA_PATH: ${{ vars.EXCEL_DATA_PATH }}

      - name: Move database test results to named directory
        if: always()
        run: mkdir -p allure-results-db && mv allure-results/* allure-results-db/ || true

      - name: Upload database test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: db-connection-test-results
          path: allure-results-db/
          retention-days: 14

  e2e-tests:
    name: E2E Tests
    runs-on: self-hosted
    needs: db-connection-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run E2E tests (INCLUDING Database Validation)
        run: npm run test:e2e -- --project=chromium --quiet
        env:
          BASE_URL: ${{ vars.BASE_URL }}
          ENV: ${{ vars.ENV }}
          CI: true
          DB_HOST: ${{ vars.DB_HOST }}
          DB_PORT: ${{ vars.DB_PORT }}
          DB_SERVICE_NAME: ${{ secrets.DB_SERVICE_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          EXCEL_DATA_PATH: ${{ vars.EXCEL_DATA_PATH }}

      - name: Move E2E test results to named directory
        if: always()
        run: mkdir -p allure-results-e2e && mv allure-results/* allure-results-e2e/ || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: allure-results-e2e/
          retention-days: 14
          if-no-files-found: ignore

  test-results:
    name: Store Test Results
    runs-on: self-hosted
    needs: [unit-tests, db-connection-tests, e2e-tests]
    if: always()

    steps:
      - name: Download unit test results
        uses: actions/download-artifact@v4
        with:
          name: unit-test-results
          path: allure-results-unit
        continue-on-error: true

      - name: Download database connection test results
        uses: actions/download-artifact@v4
        with:
          name: db-connection-test-results
          path: allure-results-db
        continue-on-error: true

      - name: Download E2E test results
        uses: actions/download-artifact@v4
        with:
          name: e2e-test-results
          path: allure-results-e2e
        continue-on-error: true

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install Allure CLI
        run: npm install -g allure-commandline
        continue-on-error: true

      - name: Generate Allure Report
        run: allure generate allure-results-unit allure-results-db allure-results-e2e --clean -o allure-report
        continue-on-error: true

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30
        continue-on-error: true
